<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerUnits="strokeWidth"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrlight" viewBox="0 0 10 10" refX="10" refY="5" markerUnits="strokeWidth"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <linearGradient id="gClient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/><stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gWeb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="gSvc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/><stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="gData" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ede9fe"/><stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="gExt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fee2e2"/><stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111">
    Архитектурна диаграма на Evento pulse
  </text>
  <text x="600" y="56" text-anchor="middle" font-size="13" fill="#555">
    ASP.NET Core 8 MVC · Entity Framework Core · SQL Server LocalDB · Sirma AI агент
  </text>

  <!-- Layer 1: Client -->
  <rect x="40" y="80" width="1120" height="110" rx="10" fill="url(#gClient)" stroke="#b45309" stroke-width="1.5"/>
  <text x="60" y="104" font-size="13" font-weight="700" fill="#7c2d12">КЛИЕНТСКИ СЛОЙ</text>

  <g>
    <rect x="80" y="118" width="220" height="58" rx="6" fill="#fff" stroke="#b45309"/>
    <text x="190" y="140" text-anchor="middle" font-size="13" font-weight="600">Уеб браузър</text>
    <text x="190" y="160" text-anchor="middle" font-size="11" fill="#555">Razor views · CSS · JS</text>
  </g>
  <g>
    <rect x="320" y="118" width="220" height="58" rx="6" fill="#fff" stroke="#b45309"/>
    <text x="430" y="140" text-anchor="middle" font-size="13" font-weight="600">Search box</text>
    <text x="430" y="160" text-anchor="middle" font-size="11" fill="#555">„техно довечера в София"</text>
  </g>
  <g>
    <rect x="560" y="118" width="220" height="58" rx="6" fill="#fff" stroke="#b45309"/>
    <text x="670" y="140" text-anchor="middle" font-size="13" font-weight="600">Google Maps Widget</text>
    <text x="670" y="160" text-anchor="middle" font-size="11" fill="#555">Маркери на събития</text>
  </g>
  <g>
    <rect x="800" y="118" width="320" height="58" rx="6" fill="#fff" stroke="#b45309"/>
    <text x="960" y="140" text-anchor="middle" font-size="13" font-weight="600">Социален поток (Posts/Likes/Comments)</text>
    <text x="960" y="160" text-anchor="middle" font-size="11" fill="#555">Рола: Admin · Organizer · User</text>
  </g>

  <!-- Layer 2: Web / MVC -->
  <rect x="40" y="210" width="1120" height="160" rx="10" fill="url(#gWeb)" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="60" y="234" font-size="13" font-weight="700" fill="#1e3a8a">УЕБ СЛОЙ — ASP.NET Core 8 MVC</text>

  <g>
    <rect x="60" y="250" width="160" height="50" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="140" y="270" text-anchor="middle" font-size="12" font-weight="600">SearchController</text>
    <text x="140" y="288" text-anchor="middle" font-size="10" fill="#555">NL заявки + LINQ</text>
  </g>
  <g>
    <rect x="230" y="250" width="160" height="50" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="310" y="270" text-anchor="middle" font-size="12" font-weight="600">EventsController</text>
    <text x="310" y="288" text-anchor="middle" font-size="10" fill="#555">CRUD на събития</text>
  </g>
  <g>
    <rect x="400" y="250" width="160" height="50" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="480" y="270" text-anchor="middle" font-size="12" font-weight="600">PostsController</text>
    <text x="480" y="288" text-anchor="middle" font-size="10" fill="#555">Социален поток</text>
  </g>
  <g>
    <rect x="570" y="250" width="170" height="50" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="655" y="270" text-anchor="middle" font-size="12" font-weight="600">TicketsController</text>
    <text x="655" y="288" text-anchor="middle" font-size="10" fill="#555">Покупка + PDF билет</text>
  </g>
  <g>
    <rect x="750" y="250" width="180" height="50" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="840" y="270" text-anchor="middle" font-size="12" font-weight="600">OrganizerController</text>
    <text x="840" y="288" text-anchor="middle" font-size="10" fill="#555">Дашборд за организатори</text>
  </g>
  <g>
    <rect x="940" y="250" width="200" height="50" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="1040" y="270" text-anchor="middle" font-size="12" font-weight="600">Account / Admin / Home</text>
    <text x="1040" y="288" text-anchor="middle" font-size="10" fill="#555">Идентичност + админ</text>
  </g>
  <g>
    <rect x="60" y="312" width="500" height="44" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-dasharray="4 3"/>
    <text x="310" y="338" text-anchor="middle" font-size="12" font-weight="600">ASP.NET Identity (роли: Admin / Organizer / User)</text>
  </g>
  <g>
    <rect x="580" y="312" width="560" height="44" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-dasharray="4 3"/>
    <text x="860" y="338" text-anchor="middle" font-size="12" font-weight="600">Razor Views · ViewModels · Areas (Identity)</text>
  </g>

  <!-- Layer 3: Services -->
  <rect x="40" y="390" width="1120" height="150" rx="10" fill="url(#gSvc)" stroke="#15803d" stroke-width="1.5"/>
  <text x="60" y="414" font-size="13" font-weight="700" fill="#14532d">СЛОЙ НА УСЛУГИТЕ</text>

  <g>
    <rect x="60" y="430" width="260" height="92" rx="6" fill="#fff" stroke="#15803d"/>
    <text x="190" y="452" text-anchor="middle" font-size="13" font-weight="700">SirmaAiSearchService</text>
    <text x="190" y="470" text-anchor="middle" font-size="11" fill="#444">IAiSearchService</text>
    <text x="190" y="488" text-anchor="middle" font-size="10.5" fill="#555">• Parse → JSON intent</text>
    <text x="190" y="504" text-anchor="middle" font-size="10.5" fill="#555">• Generate event description (BG)</text>
  </g>
  <g>
    <rect x="335" y="430" width="240" height="92" rx="6" fill="#fff" stroke="#15803d"/>
    <text x="455" y="452" text-anchor="middle" font-size="13" font-weight="700">NominatimGeocodingService</text>
    <text x="455" y="470" text-anchor="middle" font-size="11" fill="#444">IGeocodingService</text>
    <text x="455" y="488" text-anchor="middle" font-size="10.5" fill="#555">• Address → lat/lng</text>
    <text x="455" y="504" text-anchor="middle" font-size="10.5" fill="#555">• CityCoordinates fallback</text>
  </g>
  <g>
    <rect x="590" y="430" width="240" height="92" rx="6" fill="#fff" stroke="#15803d"/>
    <text x="710" y="452" text-anchor="middle" font-size="13" font-weight="700">MediaUploadService</text>
    <text x="710" y="488" text-anchor="middle" font-size="10.5" fill="#555">• Качване на изображения/видео</text>
    <text x="710" y="504" text-anchor="middle" font-size="10.5" fill="#555">• wwwroot/uploads</text>
  </g>
  <g>
    <rect x="845" y="430" width="295" height="92" rx="6" fill="#fff" stroke="#15803d"/>
    <text x="992" y="452" text-anchor="middle" font-size="13" font-weight="700">TicketDocumentService</text>
    <text x="992" y="488" text-anchor="middle" font-size="10.5" fill="#555">• Генериране на PDF билет</text>
    <text x="992" y="504" text-anchor="middle" font-size="10.5" fill="#555">• QR код + цифров подпис</text>
  </g>

  <!-- Layer 4: Data -->
  <rect x="40" y="560" width="1120" height="150" rx="10" fill="url(#gData)" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="60" y="584" font-size="13" font-weight="700" fill="#4c1d95">ДАННИ — Entity Framework Core 8</text>

  <g>
    <rect x="60" y="600" width="220" height="92" rx="6" fill="#fff" stroke="#6d28d9"/>
    <text x="170" y="622" text-anchor="middle" font-size="13" font-weight="700">ApplicationDbContext</text>
    <text x="170" y="640" text-anchor="middle" font-size="10.5" fill="#555">DbSet&lt;Event&gt;, &lt;Post&gt;, &lt;Ticket&gt;</text>
    <text x="170" y="656" text-anchor="middle" font-size="10.5" fill="#555">DbSet&lt;ApplicationUser&gt;,</text>
    <text x="170" y="672" text-anchor="middle" font-size="10.5" fill="#555">&lt;Comments&gt;, &lt;Likes&gt;, &lt;Images&gt;</text>
  </g>
  <g>
    <rect x="295" y="600" width="540" height="92" rx="6" fill="#fff" stroke="#6d28d9"/>
    <text x="565" y="622" text-anchor="middle" font-size="13" font-weight="700">Доменни модели (17 entities)</text>
    <text x="565" y="644" text-anchor="middle" font-size="10.5" fill="#555">Event · EventGenre · EventImage · EventComment · EventLike</text>
    <text x="565" y="660" text-anchor="middle" font-size="10.5" fill="#555">Post · PostImage · PostComment · PostLike · PostMediaType</text>
    <text x="565" y="676" text-anchor="middle" font-size="10.5" fill="#555">Ticket · UserTicket · Transaction · UserPreferences · OrganizerData</text>
  </g>
  <g>
    <rect x="850" y="600" width="290" height="92" rx="6" fill="#fff" stroke="#6d28d9"/>
    <text x="995" y="622" text-anchor="middle" font-size="13" font-weight="700">SQL Server LocalDB</text>
    <text x="995" y="644" text-anchor="middle" font-size="10.5" fill="#555">Релационно съхранение</text>
    <text x="995" y="660" text-anchor="middle" font-size="10.5" fill="#555">Code-First миграции</text>
    <text x="995" y="676" text-anchor="middle" font-size="10.5" fill="#555">(Migrations/)</text>
  </g>

  <!-- Layer 5: External services -->
  <rect x="40" y="730" width="1120" height="120" rx="10" fill="url(#gExt)" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="60" y="754" font-size="13" font-weight="700" fill="#7f1d1d">ВЪНШНИ УСЛУГИ</text>

  <g>
    <rect x="80" y="772" width="280" height="60" rx="6" fill="#fff" stroke="#b91c1c"/>
    <text x="220" y="794" text-anchor="middle" font-size="13" font-weight="700">Sirma AI (LLM Agent)</text>
    <text x="220" y="814" text-anchor="middle" font-size="10.5" fill="#555">REST API · prompt + JSON intent · BG copy</text>
  </g>
  <g>
    <rect x="380" y="772" width="240" height="60" rx="6" fill="#fff" stroke="#b91c1c"/>
    <text x="500" y="794" text-anchor="middle" font-size="13" font-weight="700">Nominatim / OSM</text>
    <text x="500" y="814" text-anchor="middle" font-size="10.5" fill="#555">geocode_address → lat/lng</text>
  </g>
  <g>
    <rect x="640" y="772" width="240" height="60" rx="6" fill="#fff" stroke="#b91c1c"/>
    <text x="760" y="794" text-anchor="middle" font-size="13" font-weight="700">Google Maps JS API</text>
    <text x="760" y="814" text-anchor="middle" font-size="10.5" fill="#555">Карта + маркери в браузъра</text>
  </g>
  <g>
    <rect x="900" y="772" width="220" height="60" rx="6" fill="#fff" stroke="#b91c1c"/>
    <text x="1010" y="794" text-anchor="middle" font-size="13" font-weight="700">Файлово хранилище</text>
    <text x="1010" y="814" text-anchor="middle" font-size="10.5" fill="#555">wwwroot/uploads · PDF билети</text>
  </g>

  <!-- Arrows: Client → Web -->
  <line x1="190" y1="176" x2="140" y2="250" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="430" y1="176" x2="200" y2="250" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="670" y1="176" x2="655" y2="250" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="960" y1="176" x2="1040" y2="250" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Arrows: Web → Services -->
  <line x1="140" y1="300" x2="190" y2="430" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="310" y1="300" x2="455" y2="430" stroke="#666" stroke-width="1.4" marker-end="url(#arrlight)"/>
  <line x1="480" y1="300" x2="710" y2="430" stroke="#666" stroke-width="1.4" marker-end="url(#arrlight)"/>
  <line x1="655" y1="300" x2="992" y2="430" stroke="#666" stroke-width="1.4" marker-end="url(#arrlight)"/>

  <!-- Arrows: Web → DbContext (direct read for simple list views) -->
  <line x1="310" y1="356" x2="170" y2="600" stroke="#666" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrlight)"/>

  <!-- Arrows: Services → DbContext -->
  <line x1="190" y1="522" x2="170" y2="600" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="455" y1="522" x2="200" y2="600" stroke="#333" stroke-width="1.4" marker-end="url(#arrlight)"/>
  <line x1="710" y1="522" x2="565" y2="600" stroke="#333" stroke-width="1.4" marker-end="url(#arrlight)"/>
  <line x1="992" y1="522" x2="565" y2="600" stroke="#333" stroke-width="1.4" marker-end="url(#arrlight)"/>

  <!-- DbContext → DB -->
  <line x1="280" y1="646" x2="850" y2="646" stroke="#333" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- DbContext → Domain models bidirectional (visual) -->
  <line x1="280" y1="672" x2="295" y2="672" stroke="#333" stroke-width="1.4"/>

  <!-- Services → External -->
  <line x1="190" y1="522" x2="220" y2="772" stroke="#b91c1c" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="455" y1="522" x2="500" y2="772" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="710" y1="522" x2="1010" y2="772" stroke="#b91c1c" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <line x1="992" y1="522" x2="1010" y2="772" stroke="#b91c1c" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arr)"/>

  <!-- Client → Google Maps direct (browser-side) -->
  <line x1="670" y1="118" x2="760" y2="772" stroke="#b91c1c" stroke-width="1.2" stroke-dasharray="3 4" marker-end="url(#arr)"/>

  <!-- Legend -->
  <g transform="translate(40,860)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="50" y="4" font-size="10.5" fill="#333">основен поток</text>
    <line x1="160" y1="0" x2="200" y2="0" stroke="#666" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrlight)"/>
    <text x="210" y="4" font-size="10.5" fill="#333">директен достъп до DbContext</text>
    <line x1="400" y1="0" x2="440" y2="0" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="450" y="4" font-size="10.5" fill="#333">извикване на външна услуга</text>
  </g>
</svg>
