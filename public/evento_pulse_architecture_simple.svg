<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerUnits="strokeWidth"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrlight" viewBox="0 0 10 10" refX="10" refY="5" markerUnits="strokeWidth"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <linearGradient id="gClient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/><stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gWeb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="gSvc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/><stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="gData" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ede9fe"/><stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="gExt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fee2e2"/><stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#111">
    Архитектурна диаграма на Evento pulse
  </text>
  <text x="600" y="54" text-anchor="middle" font-size="13" fill="#555">
    ASP.NET Core 8 MVC · Entity Framework Core · SQL Server LocalDB · Sirma AI агент
  </text>

  <!-- Layer 1: Client -->
  <rect x="40" y="80" width="1120" height="80" rx="10" fill="url(#gClient)" stroke="#b45309" stroke-width="1.5"/>
  <text x="60" y="102" font-size="13" font-weight="700" fill="#7c2d12">КЛИЕНТСКИ СЛОЙ</text>

  <g>
    <rect x="80" y="112" width="240" height="40" rx="6" fill="#fff" stroke="#b45309"/>
    <text x="200" y="138" text-anchor="middle" font-size="14" font-weight="600">Уеб браузър</text>
  </g>
  <g>
    <rect x="350" y="112" width="240" height="40" rx="6" fill="#fff" stroke="#b45309"/>
    <text x="470" y="138" text-anchor="middle" font-size="14" font-weight="600">Search box</text>
  </g>
  <g>
    <rect x="620" y="112" width="240" height="40" rx="6" fill="#fff" stroke="#b45309"/>
    <text x="740" y="138" text-anchor="middle" font-size="14" font-weight="600">Google Maps Widget</text>
  </g>
  <g>
    <rect x="890" y="112" width="240" height="40" rx="6" fill="#fff" stroke="#b45309"/>
    <text x="1010" y="138" text-anchor="middle" font-size="14" font-weight="600">Социален поток</text>
  </g>

  <!-- Layer 2: Web / MVC -->
  <rect x="40" y="180" width="1120" height="120" rx="10" fill="url(#gWeb)" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="60" y="202" font-size="13" font-weight="700" fill="#1e3a8a">УЕБ СЛОЙ — ASP.NET Core 8 MVC</text>

  <g>
    <rect x="60" y="214" width="170" height="34" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="145" y="236" text-anchor="middle" font-size="12.5" font-weight="600">SearchController</text>
  </g>
  <g>
    <rect x="240" y="214" width="170" height="34" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="325" y="236" text-anchor="middle" font-size="12.5" font-weight="600">EventsController</text>
  </g>
  <g>
    <rect x="420" y="214" width="170" height="34" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="505" y="236" text-anchor="middle" font-size="12.5" font-weight="600">PostsController</text>
  </g>
  <g>
    <rect x="600" y="214" width="170" height="34" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="685" y="236" text-anchor="middle" font-size="12.5" font-weight="600">TicketsController</text>
  </g>
  <g>
    <rect x="780" y="214" width="180" height="34" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="870" y="236" text-anchor="middle" font-size="12.5" font-weight="600">OrganizerController</text>
  </g>
  <g>
    <rect x="970" y="214" width="170" height="34" rx="6" fill="#fff" stroke="#1d4ed8"/>
    <text x="1055" y="236" text-anchor="middle" font-size="12.5" font-weight="600">Account / Admin</text>
  </g>
  <g>
    <rect x="60" y="256" width="500" height="36" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-dasharray="4 3"/>
    <text x="310" y="280" text-anchor="middle" font-size="12.5" font-weight="600">ASP.NET Identity</text>
  </g>
  <g>
    <rect x="580" y="256" width="560" height="36" rx="6" fill="#eff6ff" stroke="#1d4ed8" stroke-dasharray="4 3"/>
    <text x="860" y="280" text-anchor="middle" font-size="12.5" font-weight="600">Razor Views · ViewModels</text>
  </g>

  <!-- Layer 3: Services -->
  <rect x="40" y="320" width="1120" height="80" rx="10" fill="url(#gSvc)" stroke="#15803d" stroke-width="1.5"/>
  <text x="60" y="342" font-size="13" font-weight="700" fill="#14532d">СЛОЙ НА УСЛУГИТЕ</text>

  <g>
    <rect x="80" y="352" width="240" height="40" rx="6" fill="#fff" stroke="#15803d"/>
    <text x="200" y="378" text-anchor="middle" font-size="13.5" font-weight="600">SirmaAiSearchService</text>
  </g>
  <g>
    <rect x="350" y="352" width="240" height="40" rx="6" fill="#fff" stroke="#15803d"/>
    <text x="470" y="378" text-anchor="middle" font-size="13.5" font-weight="600">NominatimGeocodingService</text>
  </g>
  <g>
    <rect x="620" y="352" width="240" height="40" rx="6" fill="#fff" stroke="#15803d"/>
    <text x="740" y="378" text-anchor="middle" font-size="13.5" font-weight="600">MediaUploadService</text>
  </g>
  <g>
    <rect x="890" y="352" width="240" height="40" rx="6" fill="#fff" stroke="#15803d"/>
    <text x="1010" y="378" text-anchor="middle" font-size="13.5" font-weight="600">TicketDocumentService</text>
  </g>

  <!-- Layer 4: Data -->
  <rect x="40" y="420" width="1120" height="80" rx="10" fill="url(#gData)" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="60" y="442" font-size="13" font-weight="700" fill="#4c1d95">ДАННИ — Entity Framework Core 8</text>

  <g>
    <rect x="80" y="452" width="320" height="40" rx="6" fill="#fff" stroke="#6d28d9"/>
    <text x="240" y="478" text-anchor="middle" font-size="13.5" font-weight="600">ApplicationDbContext</text>
  </g>
  <g>
    <rect x="430" y="452" width="370" height="40" rx="6" fill="#fff" stroke="#6d28d9"/>
    <text x="615" y="478" text-anchor="middle" font-size="13.5" font-weight="600">Доменни модели</text>
  </g>
  <g>
    <rect x="830" y="452" width="300" height="40" rx="6" fill="#fff" stroke="#6d28d9"/>
    <text x="980" y="478" text-anchor="middle" font-size="13.5" font-weight="600">SQL Server LocalDB</text>
  </g>

  <!-- Layer 5: External services -->
  <rect x="40" y="520" width="1120" height="80" rx="10" fill="url(#gExt)" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="60" y="542" font-size="13" font-weight="700" fill="#7f1d1d">ВЪНШНИ УСЛУГИ</text>

  <g>
    <rect x="80" y="552" width="240" height="40" rx="6" fill="#fff" stroke="#b91c1c"/>
    <text x="200" y="578" text-anchor="middle" font-size="13.5" font-weight="600">Sirma AI</text>
  </g>
  <g>
    <rect x="350" y="552" width="240" height="40" rx="6" fill="#fff" stroke="#b91c1c"/>
    <text x="470" y="578" text-anchor="middle" font-size="13.5" font-weight="600">Nominatim / OSM</text>
  </g>
  <g>
    <rect x="620" y="552" width="240" height="40" rx="6" fill="#fff" stroke="#b91c1c"/>
    <text x="740" y="578" text-anchor="middle" font-size="13.5" font-weight="600">Google Maps JS API</text>
  </g>
  <g>
    <rect x="890" y="552" width="240" height="40" rx="6" fill="#fff" stroke="#b91c1c"/>
    <text x="1010" y="578" text-anchor="middle" font-size="13.5" font-weight="600">Файлово хранилище</text>
  </g>

  <!-- Arrows: Client → Web -->
  <line x1="200" y1="152" x2="145" y2="214" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="470" y1="152" x2="325" y2="214" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="740" y1="152" x2="685" y2="214" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="1010" y1="152" x2="1055" y2="214" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Arrows: Web → Services -->
  <line x1="145" y1="248" x2="200" y2="352" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="325" y1="248" x2="470" y2="352" stroke="#666" stroke-width="1.4" marker-end="url(#arrlight)"/>
  <line x1="505" y1="248" x2="740" y2="352" stroke="#666" stroke-width="1.4" marker-end="url(#arrlight)"/>
  <line x1="685" y1="248" x2="1010" y2="352" stroke="#666" stroke-width="1.4" marker-end="url(#arrlight)"/>

  <!-- Arrow: Web → DbContext (direct read for simple list views) -->
  <line x1="325" y1="292" x2="240" y2="452" stroke="#666" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrlight)"/>

  <!-- Arrows: Services → DbContext -->
  <line x1="200" y1="392" x2="240" y2="452" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="470" y1="392" x2="240" y2="452" stroke="#333" stroke-width="1.4" marker-end="url(#arrlight)"/>
  <line x1="740" y1="392" x2="615" y2="452" stroke="#333" stroke-width="1.4" marker-end="url(#arrlight)"/>
  <line x1="1010" y1="392" x2="615" y2="452" stroke="#333" stroke-width="1.4" marker-end="url(#arrlight)"/>

  <!-- DbContext → DB -->
  <line x1="400" y1="472" x2="830" y2="472" stroke="#333" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- DbContext ↔ Domain models -->
  <line x1="400" y1="478" x2="430" y2="478" stroke="#333" stroke-width="1.4"/>

  <!-- Services → External -->
  <line x1="200" y1="392" x2="200" y2="552" stroke="#b91c1c" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="470" y1="392" x2="470" y2="552" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="740" y1="392" x2="1010" y2="552" stroke="#b91c1c" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <line x1="1010" y1="392" x2="1010" y2="552" stroke="#b91c1c" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arr)"/>

  <!-- Client → Google Maps direct -->
  <line x1="740" y1="112" x2="740" y2="552" stroke="#b91c1c" stroke-width="1.2" stroke-dasharray="3 4" marker-end="url(#arr)"/>

  <!-- Legend -->
  <g transform="translate(40,624)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#333" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="50" y="4" font-size="10.5" fill="#333">основен поток</text>
    <line x1="160" y1="0" x2="200" y2="0" stroke="#666" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arrlight)"/>
    <text x="210" y="4" font-size="10.5" fill="#333">директен достъп до DbContext</text>
    <line x1="400" y1="0" x2="440" y2="0" stroke="#b91c1c" stroke-width="1.6" marker-end="url(#arr)"/>
    <text x="450" y="4" font-size="10.5" fill="#333">извикване на външна услуга</text>
  </g>
</svg>
